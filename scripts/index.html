<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>在线 P 图（本地运行）</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brand__title">在线 P 图</div>
        <div class="brand__sub">本地网页 · 读取根目录 assets/ · 不上传网络</div>
      </div>
      <div class="topbar__actions">
        <button id="btnReset" class="btn btn--ghost" type="button">重置</button>
        <button id="btnExport" class="btn btn--primary" type="button">导出</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel">
        <div class="panel__section">
          <div class="section__title">打开图片</div>
          <div class="row">
            <button id="btnPickFile" class="btn" type="button">从本地选择…</button>
            <input id="fileInput" class="hidden" type="file" accept="image/*" />
          </div>

          <div class="row row--gap">
            <select id="assetSelect" class="select" aria-label="从 assets 选择图片"></select>
            <button id="btnLoadAsset" class="btn" type="button">从 assets 加载</button>
          </div>
          <div class="hint">
            把照片放到根目录 <code>assets/</code>，并在 <code>assets/manifest.json</code> 的 <code>images</code> 数组里填文件名。
          </div>
        </div>

        <div class="panel__section">
          <div class="section__title">画布 / 导出</div>
          <div class="grid2">
            <label class="field">
              <div class="field__label">画布比例</div>
              <select id="aspect" class="select">
                <option value="free">自由</option>
                <option value="1:1">1:1（头像/方图）</option>
                <option value="3:4">3:4（人像/小红书）</option>
                <option value="4:3">4:3</option>
                <option value="9:16">9:16（竖屏）</option>
                <option value="16:9">16:9（横屏）</option>
              </select>
            </label>
            <label class="field">
              <div class="field__label">导出格式</div>
              <select id="exportFormat" class="select">
                <option value="image/png">PNG（无损/可透明）</option>
                <option value="image/jpeg">JPG（体积小）</option>
              </select>
            </label>
          </div>
          <div class="grid2">
            <label class="field">
              <div class="field__label">导出质量（JPG）</div>
              <input id="exportQuality" type="range" min="0.3" max="1" step="0.01" value="0.92" />
            </label>
            <label class="field">
              <div class="field__label">背景色（仅自由模式）</div>
              <input id="bgColor" type="color" value="#111827" />
            </label>
          </div>
        </div>

        <div class="panel__section">
          <div class="section__title">变换</div>
          <div class="grid2">
            <label class="field">
              <div class="field__label">缩放</div>
              <input id="zoom" type="range" min="0.2" max="3" step="0.01" value="1" />
            </label>
            <label class="field">
              <div class="field__label">旋转（度）</div>
              <input id="rotate" type="range" min="-180" max="180" step="1" value="0" />
            </label>
          </div>
          <div class="grid2">
            <label class="field">
              <div class="field__label">水平移动</div>
              <input id="offsetX" type="range" min="-2000" max="2000" step="1" value="0" />
            </label>
            <label class="field">
              <div class="field__label">垂直移动</div>
              <input id="offsetY" type="range" min="-2000" max="2000" step="1" value="0" />
            </label>
          </div>
        </div>

        <div class="panel__section">
          <div class="section__title">调色</div>
          <div class="grid2">
            <label class="field">
              <div class="field__label">亮度</div>
              <input id="brightness" type="range" min="-100" max="100" step="1" value="0" />
            </label>
            <label class="field">
              <div class="field__label">对比度</div>
              <input id="contrast" type="range" min="-100" max="100" step="1" value="0" />
            </label>
          </div>
          <div class="grid2">
            <label class="field">
              <div class="field__label">饱和度</div>
              <input id="saturation" type="range" min="-100" max="100" step="1" value="0" />
            </label>
            <label class="field">
              <div class="field__label">色相</div>
              <input id="hue" type="range" min="-180" max="180" step="1" value="0" />
            </label>
          </div>
        </div>

        <div class="panel__section">
          <div class="section__title">清晰度</div>
          <div class="grid2">
            <label class="field">
              <div class="field__label">锐化</div>
              <input id="sharpen" type="range" min="0" max="2" step="0.01" value="0" />
            </label>
            <label class="field">
              <div class="field__label">模糊</div>
              <input id="blur" type="range" min="0" max="8" step="0.1" value="0" />
            </label>
          </div>
        </div>

        <div class="panel__section">
          <div class="section__title">文字水印</div>
          <label class="field">
            <div class="field__label">文字</div>
            <input id="wmText" class="input" type="text" placeholder="例如：@你的名字" />
          </label>
          <div class="grid2">
            <label class="field">
              <div class="field__label">大小</div>
              <input id="wmSize" type="range" min="10" max="120" step="1" value="36" />
            </label>
            <label class="field">
              <div class="field__label">不透明度</div>
              <input id="wmAlpha" type="range" min="0" max="1" step="0.01" value="0.35" />
            </label>
          </div>
          <div class="grid2">
            <label class="field">
              <div class="field__label">颜色</div>
              <input id="wmColor" type="color" value="#ffffff" />
            </label>
            <label class="field">
              <div class="field__label">位置</div>
              <select id="wmPos" class="select">
                <option value="br">右下</option>
                <option value="bl">左下</option>
                <option value="tr">右上</option>
                <option value="tl">左上</option>
                <option value="center">居中</option>
              </select>
            </label>
          </div>
        </div>
      </section>

      <section class="stage">
        <div class="stage__wrap">
          <canvas id="canvas" width="1200" height="900"></canvas>
          <div class="stage__overlay">
            <div class="overlay__title">提示</div>
            <div class="overlay__body">
              - 先“从本地选择”或“从 assets 加载”<br />
              - 再调参数，最后点“导出”
            </div>
          </div>
        </div>
        <div class="footer">
          <div id="status" class="status">未加载图片</div>
          <div class="status status--muted">推荐用脚本启动：<code>node scripts/serve.mjs</code></div>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
